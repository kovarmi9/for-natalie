<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Natalie</title>

<style>
/* ===== ZÁKLAD ===== */
* { box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  touch-action: none; /* lepší ovládání na mobilu */
}

body {
  font-family: Arial, sans-serif;
  position: relative;

  /* pozadí */
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.55), transparent 35%),
    linear-gradient(180deg, #ffd6e7, #ffecc7 45%, #dff6d7);
}

/* ===== TEXT UPROSTŘED ===== */
.message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;

  z-index: 20;
  padding: 20px;
  border-radius: 20px;

  background: rgba(255,255,255,0.5);
}

/* ===== KYTIČKY ===== */
.flower {
  position: absolute;
  font-size: 2rem;
  animation: sway 4s ease-in-out infinite;

  cursor: grab;
  z-index: 10;
}

.flower.dragging {
  animation: none; /* při tažení se nehýbe */
}

@keyframes sway {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-10px) rotate(5deg); }
  100% { transform: translateY(0); }
}

/* ===== ZVÍŘÁTKA (MYŠI + KRÁVY) ===== */
.mouse {
  position: absolute;

  right: -12vw; /* začínají vpravo (nové!) */
  font-size: 2rem;

  animation: run linear infinite;
  pointer-events: none;
}

/* pohyb ZPRAVA DOLEVA */
@keyframes run {
  from { right: -12vw; }
  to   { right: 112vw; }
}

/* ===== SPODNÍ TEXT ===== */
.heart {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
}
</style>
</head>

<body>

<div class="message">
  <h1>Pro Natinku 🌸</h1>
  <p>Kytičky pro tebe 🥺🐁💗</p>
</div>

<div class="heart">Us 🐁🐀❤️</div>

<script>
/* ===== DATA ===== */

// co se může generovat
const flowers = ['🌸','🌷','🌼','🌹','🪻','❤️','💞','🌺','🪷','💐'];
const animals = ['🐭','🐁','🐀','🐂','🐄','🐮'];

// méně objektů na mobilu
const flowerCount = window.innerWidth < 700 ? 45 : 100;
const animalCount = window.innerWidth < 700 ? 5 : 10;


/* ===== KYTIČKY ===== */
for (let i = 0; i < flowerCount; i++) {

  const f = document.createElement('div');
  f.className = 'flower';

  // náhodný obsah
  f.textContent = flowers[Math.floor(Math.random() * flowers.length)];

  // náhodná pozice
  f.style.left = Math.random() * 92 + 'vw';
  f.style.top  = Math.random() * 92 + 'vh';

  // náhodná velikost a rychlost
  f.style.fontSize = (1.3 + Math.random() * 1.4) + 'rem';
  f.style.animationDuration = (3 + Math.random() * 4) + 's';

  document.body.appendChild(f);

  makeDraggable(f); // umožní tahání
}


/* ===== ZVÍŘÁTKA ===== */
for (let i = 0; i < animalCount; i++) {

  const a = document.createElement('div');
  a.className = 'mouse';

  // střídání emoji
  a.textContent = animals[i % animals.length];

  // výška (aby nebyly přes sebe)
  a.style.top = (55 + Math.random() * 35) + 'vh';

  // rychlost + náhodný start
  a.style.animationDuration = (8 + Math.random() * 10) + 's';
  a.style.animationDelay = (-Math.random() * 10) + 's';

  document.body.appendChild(a);
}


/* ===== DRAG & DROP (TAHÁNÍ KYTIČEK) ===== */
function makeDraggable(el) {

  let offsetX, offsetY, dragging = false;

  el.addEventListener('pointerdown', (e) => {
    dragging = true;
    el.classList.add('dragging');

    const rect = el.getBoundingClientRect();

    // kde jsi kliknul uvnitř objektu
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    el.setPointerCapture(e.pointerId);
  });

  el.addEventListener('pointermove', (e) => {
    if (!dragging) return;

    let x = e.clientX - offsetX;
    let y = e.clientY - offsetY;

    // omezení aby to neuteklo mimo obrazovku
    x = Math.max(0, Math.min(x, window.innerWidth - el.offsetWidth));
    y = Math.max(0, Math.min(y, window.innerHeight - el.offsetHeight));

    el.style.left = x + 'px';
    el.style.top  = y + 'px';
  });

  el.addEventListener('pointerup', (e) => {
    dragging = false;
    el.classList.remove('dragging');
    el.releasePointerCapture(e.pointerId);
  });

  el.addEventListener('pointercancel', () => {
    dragging = false;
    el.classList.remove('dragging');
  });
}
</script>

</body>
</html>
